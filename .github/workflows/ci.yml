name: CI

# Mandatory quality/security gate for this repo (issue #11). Runs on every
# push and PR and must be green before merge. Nothing here depends on
# repository/organization secrets, so it is safe to run on PRs from forks.
#
# Windows/protoc history (issue #8, #35 — see docs/windows-build-status.md
# for the full local verification writeup):
#
# `crates/build/xai-proto-build` used to hardcode
# `--dependency_out=/dev/stdout` / `--descriptor_set_out=/dev/null` when
# invoking `protoc`. Those are POSIX-only device paths, so any crate that
# transitively depends on a protoc-codegen crate (e.g. xai-grok-tools-api,
# and everything that depends on it: xai-grok-sampler, xai-grok-telemetry,
# ...) failed to build natively on windows-latest. That bug is now FIXED
# (see the fix(xai-proto-build) commit) and verified locally on native
# Windows: xai-grok-tools-api and the large majority of the workspace build
# cleanly there now, given a real `protoc.exe` reachable via `$PROTOC` or
# `$PATH`.
#
# Two smaller items still block flipping `windows-scoped` below to the full
# `--workspace` matrix used by the Linux/macOS legs:
#   1. `bin/protoc`'s DotSlash wrapper is a shebang script Windows can't
#      execute directly (no shim yet, tracked in #35) — this job installs a
#      real `protoc.exe` via chocolatey and points `$PROTOC` at it instead of
#      relying on `bin/protoc`.
#   2. An unrelated compile error (`AgentRebuildSpec` missing the
#      `search_backend` field at one call site in xai-grok-shell) currently
#      breaks `cargo check --workspace` on every platform, not just Windows;
#      it's tracked as a separate follow-up rather than papered over here.
# Until (2) is fixed, this job is intentionally scoped to
# `xai-grok-tools-api` (the crate that was the canonical repro for the
# /dev/stdout bug) plus the previously-covered `xai-grok-secrets`, so it's a
# real, honest signal instead of a green check that never compiles anything
# meaningful, or a red check for a reason that has nothing to do with
# Windows.

on:
  push:
    branches: [main]
  pull_request:
  workflow_call: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (from rust-toolchain.toml)
        run: rustup show
      - run: cargo fmt --all -- --check

  coverage:
    name: coverage (LCOV threshold)
    runs-on: ubuntu-latest
    needs: [fmt]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (from rust-toolchain.toml)
        run: rustup show
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Generate LCOV coverage
        run: cargo llvm-cov --workspace --all-targets --lcov --output-path coverage.lcov
      - name: Enforce coverage threshold
        run: python3 scripts/check_coverage.py coverage.lcov --threshold 85

  simplicio-owned-reports:
    name: Simplicio invariant and invocation reports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run scoped struct-initializer review report
        continue-on-error: true
        run: python3 scripts/check_unused_struct_locals.py --json > struct-initializer-report.json
      - name: Generate offline headless invocation matrix
        run: python3 scripts/headless_invocation_matrix.py --json > headless-invocation-matrix.json
      - name: Validate failure-diagnostics artifact path
        run: |
          python3 -m py_compile scripts/ci_diagnostics.py scripts/tests/test_ci_diagnostics.py
          python3 scripts/tests/test_ci_diagnostics.py
      - name: Run gate self-tests
        run: python3 scripts/tests/test_issue_68_gates.py
      - name: Run installed AgentHost and Runtime E2E
        run: |
          python3 -m unittest scripts.tests.test_installed_code_e2e
          python3 scripts/installed_code_e2e.py --output installed-e2e-receipt.json
      - name: Verify reproducible issue meta-audit
        run: |
          python3 -m pytest scripts/tests/test_issue_meta_audit.py -q
          python3 scripts/issue_meta_audit.py \
            --input docs/audits/issue-139-source.json \
            --json /tmp/issue-139-inventory.json \
            --markdown /tmp/issue-139-report.md
          diff -u docs/audits/issue-139-inventory.json /tmp/issue-139-inventory.json
          diff -u docs/audits/issue-139-report.md /tmp/issue-139-report.md
      - name: Upload Simplicio reports
        uses: actions/upload-artifact@v4
        with:
          name: simplicio-owned-reports
          path: |
            struct-initializer-report.json
            headless-invocation-matrix.json
            installed-e2e-receipt.json

  # Fails the build on any secret-shaped string introduced by this push/PR.
  # This is the CI-side half of issue #9's "block release when the scanner
  # finds a secret" requirement.
  #
  # Deliberately scoped to the new commits (base..head for a PR, before..
  # after for a push), NOT gitleaks' whole-history mode: a real
  # `gitleaks detect` full-history run against this repo's actual git log
  # (19k+ commits, inherited from the pre-Rust-rewrite "opencode" ancestor
  # project) surfaces ~87 findings, all in files that no longer exist in the
  # tree (deleted TS/Go source, `.stats.yml` config hashes) and all
  # entropy-based false positives on hashes/checksums, not real secrets —
  # see the incident-runbook §6 note. Gating every PR on that pre-existing,
  # already-public history would make the check permanently red for reasons
  # unrelated to the change under review. A one-time full-history baseline
  # scan (and, if any turn out to be real, a history rewrite) is tracked as
  # separate follow-up, not something this per-PR gate should own.
  secret-scan:
    name: secret-scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sSfL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Determine commit range
        id: range
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "range=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            before="${{ github.event.before }}"
            # First push of a new branch reports an all-zero SHA; fall back
            # to scanning just the pushed commit in that case.
            if [ -z "$before" ] || [[ "$before" =~ ^0+$ ]]; then
              echo "range=${{ github.sha }}~1..${{ github.sha }}" >> "$GITHUB_OUTPUT"
            else
              echo "range=${before}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
            fi
          fi
      - name: gitleaks (diff-scoped)
        run: |
          gitleaks detect --source . -c .gitleaks.toml \
            --log-opts="${{ steps.range.outputs.range }}" \
            --redact -v

  # Full workspace lint/build/test on the two platforms where the workspace
  # is known to build cleanly (see the header note re: Windows/protoc).
  lint-build-test:
    name: lint-build-test (${{ matrix.os }})
    needs: [fmt]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (from rust-toolchain.toml)
        run: rustup show
      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: cargo clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo check
        run: cargo check --workspace --all-targets
      - name: cargo test
        run: cargo test --workspace --all-targets

  # Windows leg: the xai-proto-build /dev/stdout|/dev/null bug (issues #8,
  # #35) is fixed and locally verified (docs/windows-build-status.md), so
  # this now also builds xai-grok-tools-api — the crate that was the
  # canonical repro for that bug — using a real protoc.exe installed via
  # chocolatey (bin/protoc's DotSlash wrapper still can't run natively on
  # Windows; that's the separate, still-open part of #35). Still scoped
  # short of the full `--workspace` matrix used by Linux/macOS because of an
  # unrelated pre-existing compile error breaking `cargo check --workspace`
  # on every platform right now (see the header comment above) — extend this
  # list as more crates are verified clean, and replace with the full matrix
  # once that's fixed.
  windows-scoped:
    name: lint-build-test (windows-latest, security crates)
    needs: [fmt]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (from rust-toolchain.toml)
        run: rustup show
      - name: Install protoc (Windows)
        run: choco install protoc -y --no-progress
      - name: Add protoc to PROTOC env var
        shell: bash
        run: echo "PROTOC=$(which protoc)" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: cargo clippy (xai-grok-secrets, deny warnings)
        run: cargo clippy -p xai-grok-secrets --all-targets -- -D warnings
      - name: cargo test (xai-grok-secrets)
        run: cargo test -p xai-grok-secrets --all-targets
      - name: cargo check (xai-grok-tools-api, protoc-dependent, issue #8/#35)
        run: cargo check -p xai-grok-tools-api --all-targets

  # cargo-deny: advisories (known vulns), license allow-list, and duplicate/
  # banned dependency checks. Config lives in deny.toml at the repo root.
  cargo-deny:
    name: cargo-deny (advisories, licenses, bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check all

  # Keep one bounded, credential-safe artifact when any mandatory job fails.
  # This makes setup failures auditable without rerunning Actions or dumping env.
  ci-diagnostics:
    name: CI failure diagnostics
    if: ${{ always() && (needs.fmt.result == 'failure' || needs.coverage.result == 'failure' || needs.simplicio-owned-reports.result == 'failure' || needs.secret-scan.result == 'failure' || needs.lint-build-test.result == 'failure' || needs.windows-scoped.result == 'failure' || needs.cargo-deny.result == 'failure') }}
    needs: [fmt, coverage, simplicio-owned-reports, secret-scan, lint-build-test, windows-scoped, cargo-deny]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Collect bounded diagnostics
        run: python3 scripts/ci_diagnostics.py --root . --output ci-diagnostics.json
      - uses: actions/upload-artifact@v4
        with:
          name: ci-failure-diagnostics
          if-no-files-found: error
          path: ci-diagnostics.json
