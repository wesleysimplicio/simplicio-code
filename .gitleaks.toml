# gitleaks config for Simplicio Code (issue #9: secret scanning gate).
#
# Extends gitleaks' built-in default ruleset (vendor key shapes, PEM blocks,
# JWTs, generic high-entropy assignments, etc.) rather than replacing it.
#
# Real secrets must NEVER be allowlisted here. The only entries below are:
#   1. `target/` — build output, already gitignored, never committed; listed
#      defensively for anyone running `gitleaks detect` locally without
#      `--no-git` against a dirty tree.
#   2. Specific, already-reviewed test-fixture lines in the redaction test
#      suites that intentionally contain secret-*shaped* (never real) values
#      to exercise `xai_grok_secrets::redact_secrets`. Each one is inline
#      `//gitleaks:allow`-annotated at the source line, which is gitleaks'
#      supported per-line suppression — this file only needs to allowlist
#      the path so CI doesn't have to special-case every generated fixture
#      string shape as a global regex exception.
[extend]
useDefault = true

[allowlist]
description = "Build output and reviewed test-fixture files"
paths = [
  '''^target/''',
  # Regex/redaction unit tests: fixtures assembled at runtime specifically to
  # look like real vendor secrets so the sanitizer's shape-matching is
  # exercised end to end. See the `fixture()` helper doc comment in this file.
  '''^crates/codegen/xai-grok-secrets/src/sanitizer\.rs$''',
  # Same pattern: canary/placeholder secrets used to prove telemetry/otel
  # redaction actually strips them before export.
  '''^crates/codegen/xai-grok-telemetry/src/external/tests\.rs$''',
  '''^crates/codegen/xai-grok-telemetry/src/otel_layer/redact\.rs$''',
  '''^crates/codegen/xai-grok-workspace/src/hub_auth\.rs$''',
  '''^crates/codegen/xai-grok-tools/src/implementations/web_search/types\.rs$''',
  '''^crates/codegen/xai-grok-shell/tests/test_built_binary_e2e\.rs$''',
]
